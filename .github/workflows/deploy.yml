name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: backend:deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate branch and environment
        run: |
          BRANCH="${{ github.ref_name }}"
          ENV="${{ inputs.environment }}"
          if [ "$ENV" = "production" ] && [ "$BRANCH" != "master" ]; then
            echo "Production deployments must be triggered from master, not $BRANCH"
            exit 1
          fi
          if [ "$ENV" = "staging" ] && [ "$BRANCH" != "develop" ]; then
            echo "Staging deployments must be triggered from develop, not $BRANCH"
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Check and provision Postgres
        run: |
          if railway service status --all --json 2>/dev/null | jq -e '.[] | select(.name == "Postgres")' > /dev/null 2>&1; then
            echo "Postgres already exists, skipping"
            exit 0
          fi
          railway add --database postgres

      - name: Check and provision API service
        run: |
          if railway service status --all --json 2>/dev/null | jq -e '.[] | select(.name == "api")' > /dev/null 2>&1; then
            echo "API service already exists, skipping"
            exit 0
          fi
          DOLLAR='$'
          railway add --service api \
            -v "DATABASE_URL=${DOLLAR}{{Postgres.DATABASE_URL}}" \
            -v "DB_HOST=${DOLLAR}{{Postgres.PGHOST}}" \
            -v "DB_PORT=${DOLLAR}{{Postgres.PGPORT}}" \
            -v "DB_USER=${DOLLAR}{{Postgres.PGUSER}}" \
            -v "DB_PASSWORD=${DOLLAR}{{Postgres.PGPASSWORD}}" \
            -v "DB_NAME=${DOLLAR}{{Postgres.PGDATABASE}}" \
            -v "CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}"

      - name: Deploy API
        run: railway up \
          --service api \
          --environment "$RAILWAY_ENVIRONMENT" \
          --project "$RAILWAY_PROJECT_ID" \
          --detach
