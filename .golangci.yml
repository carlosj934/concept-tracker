version: "2"

run:
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - copyloopvar
    - errcheck
    - govet
    - ineffassign
    - nilnesserr
    - nonamedreturns
    - staticcheck
    - unused

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    staticcheck:
      checks:
        - all
        - -QF*
        - -ST1003
        - -ST1005
        - -ST1008
        - -ST1012
        - -ST1016
        - -ST1018
        - -ST1023

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - localmodule
