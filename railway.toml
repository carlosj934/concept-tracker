[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "cmd/**",
  "internal/**",
  "config/**",
  "db/migrations/**",
  "go.mod",
  "go.sum",
  "Dockerfile",
  "railway.toml"
]

[deploy]
startCommand = "./ct-api"
preDeployCommand = "/bin/sh -c \"migrate -path /app/db/migrations -database $DATABASE_URL up\""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
region = "us-west"

[deploy.limitOverride.containers]
cpu = 2
memoryBytes = 4294967296

[deploy.deploymentTeardown]
overlapSeconds = 10
drainSeconds = 30

[environments.staging.deploy]
restartPolicyType = "NEVER"

[environments.production.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
